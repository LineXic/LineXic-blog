[build]
  command = "pnpm run build"
  publish = "dist"
  base = "/"

[build.environment]
  NODE_VERSION = "20"
  PNPM_VERSION = "10.13.1"
  NPM_CONFIG_PRODUCTION = "false"

# === SSR 支持：启用 Serverless Functions ===
[[redirects]]
  from = "/*"
  to = ".netlify/functions/___astro"
  status = 200
  force = true

# === 可选：静态资源回退（如果你混合使用静态和动态路由）===
# 如果你想让某些路径走静态，其他走 SSR，可以用更细粒度规则
# 但通常直接用上面一条就够了

# === SEO：强制 HTTPS 和 www 统一 ===
[[redirects]]
  from = "http://linexic.top/*"
  to = "https://www.linexic.top/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://linexic.top/*"
  to = "https://www.linexic.top/:splat"
  status = 301
  force = true

# === 静态资源缓存优化（不影响 SSR）===
[[headers]]
  for = "/assets/**"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/rss.xml"
  [headers.values]
    Content-Type = "application/xml; charset=UTF-8"
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/sitemap-*.xml"
  [headers.values]
    Content-Type = "application/xml; charset=UTF-8"
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/_pagefind/**"
  [headers.values]
    Cache-Control = "public, max-age=3600"